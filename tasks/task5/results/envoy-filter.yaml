apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: feature-flag-filter
  namespace: default
spec:
  workloadSelector:
    labels:
      app: booking-service
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: SIDECAR_INBOUND
        listener:
          filterChain:
            filter:
              name: "envoy.filters.network.http_connection_manager"
              subFilter:
                name: "envoy.filters.http.router"
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.lua
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.LuaPerRoute
            source_code:
              inline_string: |
                function envoy_on_request(request_handle)
                  local feature = request_handle:headers():get("X-Feature-Enabled")
                  if feature == "true" then
                    request_handle:headers():add("x-envoy-feature-routed", "true")
                  end
                end
                function envoy_on_response(response_handle)
                  local routed = response_handle:headers():get("x-envoy-feature-routed")
                  if routed == "true" then
                    response_handle:headers():add("X-Feature-Route", "v2")
                  end
                end
