apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: booking-service
spec:
  hosts:
    - "*"
  gateways:
    - booking-gateway
  http:
    # Маршрут по фича-флагу: X-Feature-Enabled: true -> v2
    - match:
        - headers:
            X-Feature-Enabled:
              exact: "true"
      route:
        - destination:
            host: booking-service
            subset: v2

    # Канареечный релиз: 90% -> v1, 10% -> v2
    # Retry + fallback: при ошибках v1 повторяем запрос (попадаем в v2 через retries)
    - route:
        - destination:
            host: booking-service
            subset: v1
          weight: 90
        - destination:
            host: booking-service
            subset: v2
          weight: 10
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: connect-failure,reset,5xx
---
# VirtualService для in-cluster (mesh) трафика
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: booking-service-mesh
spec:
  hosts:
    - booking-service
  gateways:
    - mesh
  http:
    - match:
        - headers:
            X-Feature-Enabled:
              exact: "true"
      route:
        - destination:
            host: booking-service
            subset: v2
    - route:
        - destination:
            host: booking-service
            subset: v1
          weight: 90
        - destination:
            host: booking-service
            subset: v2
          weight: 10
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: connect-failure,reset,5xx
