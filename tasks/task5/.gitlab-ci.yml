stages:
  - build
  - test
  - deploy
  - tag

variables:
  IMAGE_TAG: latest
  IMAGE_NAME: booking-service

build:
  stage: build
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG ./booking-service

test:
  stage: test
  script:
    - docker run --rm --name booking-test -d -p 8080:8080 $IMAGE_NAME:$IMAGE_TAG
    - sleep 2
    - curl -f http://localhost:8080/ping
    - docker stop booking-test

deploy:
  stage: deploy
  script:
    - minikube image load $IMAGE_NAME:$IMAGE_TAG
    - helm upgrade --install booking-service ./helm/booking-service
      --set image.name=$IMAGE_NAME
      --set image.tag=$IMAGE_TAG
      --wait

tag:
  stage: tag
  script:
    - docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:$CI_COMMIT_SHORT_SHA
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
